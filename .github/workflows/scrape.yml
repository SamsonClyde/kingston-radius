name: Scrape Events

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper
        run: python scraper.py

      - name: Commit updated events.js
        run: |
          git config user.name "Kingston Radius Bot"
          git config user.email "bot@kingstonradius.netlify.app"
          git add events.js
          git diff --staged --quiet || git commit -m "Auto-update events $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
