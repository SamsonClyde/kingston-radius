<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kingston Radius — Concerts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #C0392B;
      --red-light: #FDECEA;
      --bg: #F7F5F0;
      --card: #FFFFFF;
      --border: rgba(0,0,0,0.08);
      --text: #1A1A18;
      --muted: #787872;
      --faint: #ACABA3;
      --green: #2E7D32;
      --green-bg: #EBF5EB;
    }

    html { font-size: 16px; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* HEADER */
    header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-inner {
      max-width: 700px;
      margin: 0 auto;
      padding: 0 1.25rem;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      font-family: 'DM Serif Display', serif;
      font-size: 20px;
      letter-spacing: -0.3px;
      color: var(--text);
      text-decoration: none;
    }
    .logo em {
      color: var(--red);
      font-style: italic;
    }
    nav {
      display: flex;
      gap: 2px;
    }
    nav a {
      font-size: 13px;
      font-weight: 400;
      padding: 5px 11px;
      border-radius: 20px;
      color: var(--muted);
      text-decoration: none;
      transition: background 0.15s, color 0.15s;
    }
    nav a:hover { background: var(--bg); color: var(--text); }
    nav a.active {
      background: var(--text);
      color: #fff;
      font-weight: 500;
    }
    nav a.soon { opacity: 0.4; pointer-events: none; }

    /* MAIN */
    main {
      max-width: 700px;
      margin: 0 auto;
      padding: 2rem 1.25rem 4rem;
    }

    /* PAGE TITLE */
    .page-title {
      font-family: 'DM Serif Display', serif;
      font-size: 28px;
      font-weight: 400;
      letter-spacing: -0.5px;
      margin-bottom: 0.25rem;
    }
    .page-subtitle {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 2rem;
    }

    /* MONTH DIVIDER */
    .month-group { margin-bottom: 2.5rem; }
    .month-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--faint);
      margin-bottom: 0.75rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    /* EVENT CARD */
    .event {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 18px;
      margin-bottom: 10px;
      display: flex;
      gap: 16px;
      align-items: flex-start;
      transition: box-shadow 0.15s, transform 0.15s;
    }
    .event:hover {
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      transform: translateY(-1px);
    }

    .event-date {
      min-width: 44px;
      text-align: center;
      padding-top: 2px;
    }
    .event-date .day {
      font-family: 'DM Serif Display', serif;
      font-size: 26px;
      line-height: 1;
      color: var(--text);
    }
    .event-date .dow {
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--faint);
      margin-top: 2px;
    }

    .event-sep {
      width: 1px;
      background: var(--border);
      align-self: stretch;
      flex-shrink: 0;
    }

    .event-body { flex: 1; min-width: 0; }

    .event-title {
      font-size: 15px;
      font-weight: 500;
      line-height: 1.35;
      margin-bottom: 6px;
      color: var(--text);
    }

    .event-venue {
      font-size: 13px;
      margin-bottom: 2px;
    }
    .event-venue a {
      color: var(--red);
      text-decoration: none;
      font-weight: 500;
    }
    .event-venue a:hover { text-decoration: underline; }

    .event-location {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .event-location a {
      color: var(--muted);
      text-decoration: none;
    }
    .event-location a:hover { text-decoration: underline; }

    .event-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .pill {
      font-size: 11px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      color: var(--muted);
      background: var(--bg);
    }
    .pill.free {
      background: var(--green-bg);
      border-color: rgba(46,125,50,0.2);
      color: var(--green);
    }

    /* EMPTY STATE */
    .empty {
      text-align: center;
      padding: 4rem 1rem;
      color: var(--faint);
      font-size: 14px;
    }
    .empty strong { display: block; font-size: 18px; font-weight: 400; margin-bottom: 0.5rem; color: var(--muted); }

    /* FOOTER */
    footer {
      text-align: center;
      font-size: 12px;
      color: var(--faint);
      padding: 2rem 1rem;
      border-top: 1px solid var(--border);
      margin-top: 2rem;
    }
    footer a { color: var(--faint); text-decoration: none; }
    footer a:hover { color: var(--muted); }

    /* ADMIN PANEL */
    .admin-toggle {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: var(--text);
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 10px 20px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      z-index: 200;
    }
    .admin-toggle:hover { background: #333; }

    .admin-panel {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 300;
      align-items: flex-end;
      justify-content: center;
    }
    .admin-panel.open { display: flex; }

    .admin-sheet {
      background: var(--card);
      border-radius: 20px 20px 0 0;
      padding: 2rem 1.5rem;
      width: 100%;
      max-width: 700px;
      max-height: 90vh;
      overflow-y: auto;
    }
    .admin-sheet h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 20px;
      font-weight: 400;
      margin-bottom: 1.25rem;
    }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .form-grid .full { grid-column: 1 / -1; }
    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
      margin-bottom: 5px;
    }
    input, select {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      background: var(--bg);
      color: var(--text);
      outline: none;
    }
    input:focus, select:focus { border-color: var(--text); }

    .form-actions {
      display: flex;
      gap: 10px;
      margin-top: 1.25rem;
    }
    .btn-primary {
      flex: 1;
      padding: 11px;
      background: var(--text);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }
    .btn-primary:hover { background: #333; }
    .btn-cancel {
      padding: 11px 20px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      cursor: pointer;
      color: var(--muted);
    }
    .btn-cancel:hover { background: var(--bg); }

    .export-section {
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }
    .export-section h3 {
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }
    .export-btn {
      width: 100%;
      padding: 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      cursor: pointer;
      color: var(--text);
      text-align: left;
    }
    .export-btn:hover { background: var(--border); }

    @media (max-width: 480px) {
      .form-grid { grid-template-columns: 1fr; }
      .form-grid .full { grid-column: 1; }
      nav a { padding: 5px 8px; font-size: 12px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="index.html" class="logo">Kingston <em>Radius</em></a>
    <nav>
      <a href="index.html" class="active">Concerts</a>
      <a href="#" class="soon">Movies</a>
      <a href="#" class="soon">Comedy</a>
      <a href="#" class="soon">Art</a>
    </nav>
  </div>
</header>

<main>
  <h1 class="page-title">Concerts</h1>
  <p class="page-subtitle">Live music within 90 minutes of Kingston, NY</p>
  <div id="events-list"></div>
</main>

<footer>
  <p>Kingston Radius &mdash; <a href="#">Submit a show</a></p>
</footer>

<button class="admin-toggle" onclick="openAdmin()">+ Add Event</button>

<div class="admin-panel" id="adminPanel">
  <div class="admin-sheet">
    <h2>Add an Event</h2>
    <div class="form-grid">
      <div class="full">
        <label>Show / Artist Name</label>
        <input type="text" id="f-title" placeholder="e.g. The Mountain Goats">
      </div>
      <div>
        <label>Date</label>
        <input type="date" id="f-date">
      </div>
      <div>
        <label>Time</label>
        <input type="time" id="f-time">
      </div>
      <div class="full">
        <label>Venue Name</label>
        <input type="text" id="f-venue" placeholder="e.g. Bearsville Theater">
      </div>
      <div class="full">
        <label>Venue Website</label>
        <input type="url" id="f-venueUrl" placeholder="https://...">
      </div>
      <div>
        <label>City, State</label>
        <input type="text" id="f-location" placeholder="e.g. Woodstock, NY">
      </div>
      <div>
        <label>Price</label>
        <input type="text" id="f-price" placeholder="e.g. $20 or Free">
      </div>
      <div class="full">
        <label>Google Maps URL (optional)</label>
        <input type="url" id="f-maps" placeholder="https://maps.google.com/?q=...">
      </div>
    </div>
    <div class="form-actions">
      <button class="btn-primary" onclick="addEvent()">Add Event</button>
      <button class="btn-cancel" onclick="closeAdmin()">Cancel</button>
    </div>
    <div class="export-section">
      <h3>Export / Backup</h3>
      <button class="export-btn" onclick="exportEvents()">Download events.js backup</button>
    </div>
  </div>
</div>

<script src="events.js"></script>
<script>
  let events = [...EVENTS];

  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  function parseLocalDate(str) {
    const [y, m, d] = str.split('-').map(Number);
    return new Date(y, m - 1, d);
  }

  function formatTime(t) {
    if (!t) return '';
    const [h, m] = t.split(':').map(Number);
    const ampm = h >= 12 ? 'PM' : 'AM';
    const hour = h % 12 || 12;
    return `${hour}:${String(m).padStart(2,'0')} ${ampm}`;
  }

  function render() {
    const list = document.getElementById('events-list');
    const now = new Date();
    now.setHours(0,0,0,0);

    const upcoming = events
      .filter(e => parseLocalDate(e.date) >= now)
      .sort((a, b) => a.date.localeCompare(b.date));

    if (!upcoming.length) {
      list.innerHTML = '<div class="empty"><strong>No upcoming shows</strong>Add your first event with the button below.</div>';
      return;
    }

    const grouped = {};
    upcoming.forEach(e => {
      const d = parseLocalDate(e.date);
      const key = `${d.getFullYear()}-${d.getMonth()}`;
      if (!grouped[key]) grouped[key] = { label: `${MONTHS[d.getMonth()]} ${d.getFullYear()}`, events: [] };
      grouped[key].events.push(e);
    });

    list.innerHTML = Object.values(grouped).map(g => `
      <div class="month-group">
        <div class="month-label">${g.label}</div>
        ${g.events.map(e => {
          const d = parseLocalDate(e.date);
          const isFree = e.free || e.price.toLowerCase() === 'free';
          const mapsHref = e.mapsUrl || `https://maps.google.com/?q=${encodeURIComponent(e.venue + ' ' + e.location)}`;
          return `
          <div class="event">
            <div class="event-date">
              <div class="day">${d.getDate()}</div>
              <div class="dow">${DAYS[d.getDay()]}</div>
            </div>
            <div class="event-sep"></div>
            <div class="event-body">
              <div class="event-title">${e.title}</div>
              <div class="event-venue"><a href="${e.venueUrl}" target="_blank" rel="noopener">${e.venue}</a></div>
              <div class="event-location"><a href="${mapsHref}" target="_blank" rel="noopener">${e.location}</a></div>
              <div class="event-pills">
                ${e.time ? `<span class="pill">${e.time}</span>` : ''}
                <span class="pill${isFree ? ' free' : ''}">${e.price}</span>
              </div>
            </div>
          </div>`;
        }).join('')}
      </div>
    `).join('');
  }

  function openAdmin() {
    document.getElementById('adminPanel').classList.add('open');
  }
  function closeAdmin() {
    document.getElementById('adminPanel').classList.remove('open');
  }

  document.getElementById('adminPanel').addEventListener('click', function(e) {
    if (e.target === this) closeAdmin();
  });

  function addEvent() {
    const title = document.getElementById('f-title').value.trim();
    const date = document.getElementById('f-date').value;
    const timeRaw = document.getElementById('f-time').value;
    const venue = document.getElementById('f-venue').value.trim();
    const venueUrl = document.getElementById('f-venueUrl').value.trim();
    const location = document.getElementById('f-location').value.trim();
    const price = document.getElementById('f-price').value.trim();
    const mapsUrl = document.getElementById('f-maps').value.trim();

    if (!title || !date || !venue || !location || !price) {
      alert('Please fill in: show name, date, venue, city, and price.');
      return;
    }

    const isFree = price.toLowerCase() === 'free';
    const newEvent = {
      id: Date.now(),
      date,
      title,
      venue,
      venueUrl: venueUrl || '#',
      location,
      mapsUrl: mapsUrl || '',
      time: timeRaw ? formatTime(timeRaw) : '',
      price: isFree ? 'Free' : price,
      free: isFree
    };

    events.push(newEvent);
    render();
    closeAdmin();

    ['f-title','f-date','f-time','f-venue','f-venueUrl','f-location','f-price','f-maps'].forEach(id => {
      document.getElementById(id).value = '';
    });
  }

  function exportEvents() {
    const lines = events.map((e, i) => `  {
    id: ${e.id},
    date: "${e.date}",
    title: "${e.title}",
    venue: "${e.venue}",
    venueUrl: "${e.venueUrl}",
    location: "${e.location}",
    mapsUrl: "${e.mapsUrl}",
    time: "${e.time}",
    price: "${e.price}",
    free: ${e.free}
  }`);
    const content = `const EVENTS = [\n${lines.join(',\n')}\n];\n`;
    const blob = new Blob([content], { type: 'text/javascript' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'events.js';
    a.click();
  }

  render();
</script>
</body>
</html>
