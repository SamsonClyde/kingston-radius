<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kingston Radius — Live Music Near You</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #C0392B;
    --red-dark: #96281B;
    --bg: #F7F5F0;
    --card: #FFFFFF;
    --text: #1A1A18;
    --muted: #888880;
    --border: #E8E6E0;
    --tag-bg: #F0EEE8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── HEADER ── */
  header {
    background: var(--text);
    color: #fff;
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo { font-family: 'DM Serif Display', serif; font-size: 1.3rem; letter-spacing: 0.01em; }
  .logo span { color: var(--red); }
  nav { display: flex; gap: 6px; }
  nav a {
    color: rgba(255,255,255,0.5);
    text-decoration: none;
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 6px 10px;
    border-radius: 4px;
    transition: color 0.15s;
  }
  nav a:hover { color: rgba(255,255,255,0.9); }
  nav a.active { color: #fff; background: rgba(255,255,255,0.1); }

  /* ── FILTERS ── */
  .filters-bar {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 10px 24px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .filter-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-label {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-right: 2px;
  }
  .filter-btn {
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    padding: 5px 12px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--text); }
  .filter-btn.active { background: var(--text); color: #fff; border-color: var(--text); }
  .filter-btn.red-btn { border-color: var(--red); color: var(--red); }
  .filter-btn.red-btn.active { background: var(--red); color: #fff; }
  .filter-sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }
  .venue-select {
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    padding: 5px 10px;
    border-radius: 20px;
    cursor: pointer;
    transition: border-color 0.15s;
    max-width: 220px;
  }
  .venue-select:focus { outline: none; border-color: var(--text); }

  /* ── MAIN ── */
  main { max-width: 860px; margin: 0 auto; padding: 28px 16px 80px; }

  .section-head {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 18px;
  }
  .section-head h2 { font-family: 'DM Serif Display', serif; font-size: 1.5rem; }
  .event-count { font-size: 0.78rem; color: var(--muted); font-weight: 400; }

  /* ── EVENT CARD ── */
  .event-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 18px;
    margin-bottom: 8px;
    display: grid;
    grid-template-columns: 72px 1fr;
    gap: 0 16px;
    align-items: start;
    transition: box-shadow 0.15s;
  }
  .event-card:hover { box-shadow: 0 3px 12px rgba(0,0,0,0.08); }
  .event-card.manual-event { border-left: 3px solid var(--red); }

  .event-date {
    text-align: center;
    padding-top: 2px;
  }
  .date-day {
    font-family: 'DM Serif Display', serif;
    font-size: 1.8rem;
    line-height: 1;
    color: var(--red);
  }
  .date-mon {
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .date-dow {
    font-size: 0.65rem;
    color: var(--muted);
    margin-top: 1px;
  }
  .date-time {
    font-size: 0.72rem;
    font-weight: 500;
    color: var(--text);
    margin-top: 5px;
    line-height: 1.3;
  }
  .date-price {
    font-size: 0.68rem;
    color: var(--muted);
    margin-top: 2px;
  }

  .event-body {}
  .event-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.05rem;
    line-height: 1.25;
    margin-bottom: 4px;
  }
  .event-venue {
    font-size: 0.82rem;
    color: var(--muted);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  .event-venue a { color: var(--red); text-decoration: none; font-weight: 500; }
  .event-venue a:hover { text-decoration: underline; }
  .venue-loc { color: var(--muted); }
  .venue-loc a { color: var(--muted); text-decoration: none; }
  .venue-loc a:hover { color: var(--text); }
  .drive-time {
    font-size: 0.72rem;
    color: var(--muted);
    font-style: italic;
  }
  .event-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .tag {
    font-size: 0.7rem;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 10px;
    background: var(--tag-bg);
    color: var(--muted);
  }
  .tag.free { background: #E8F5E9; color: #2E7D32; }

  .no-events {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .no-events h3 { font-family: 'DM Serif Display', serif; font-size: 1.4rem; margin-bottom: 8px; color: var(--text); }

  @media (max-width: 600px) {
    .event-card { grid-template-columns: 60px 1fr; }
    .filters-bar { padding: 10px 12px; }
    main { padding: 20px 12px 80px; }
    .form-row { grid-template-columns: 1fr; }
    .venue-select { max-width: 160px; }
  }

  /* ── ADMIN PANEL ── */
  #admin-trigger {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--text);
    color: #fff;
    border: none;
    font-size: 1.3rem;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(0,0,0,0.25);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }
  #admin-trigger:hover { background: var(--red); }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 300;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--card);
    border-radius: 12px;
    width: 100%;
    max-width: 500px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .modal-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .modal-header h3 { font-family: 'DM Serif Display', serif; font-size: 1.2rem; }
  .modal-close {
    background: none;
    border: none;
    font-size: 1.3rem;
    cursor: pointer;
    color: var(--muted);
    padding: 4px;
    line-height: 1;
  }
  .modal-close:hover { color: var(--text); }
  .modal-body { padding: 20px 24px; }

  /* Auth screen */
  #auth-screen, #form-screen, #manage-screen { display: none; }
  #auth-screen.active, #form-screen.active, #manage-screen.active { display: block; }

  .form-group { margin-bottom: 14px; }
  .form-group label {
    display: block;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 5px;
  }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    color: var(--text);
    background: var(--bg);
    transition: border-color 0.15s;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    outline: none;
    border-color: var(--text);
  }
  .form-group textarea { resize: vertical; min-height: 60px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .btn-primary {
    width: 100%;
    background: var(--text);
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-primary:hover { background: var(--red); }
  .btn-danger {
    background: none;
    border: 1.5px solid #e74c3c;
    color: #e74c3c;
    border-radius: 6px;
    padding: 4px 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-danger:hover { background: #e74c3c; color: #fff; }

  .auth-error { color: var(--red); font-size: 0.82rem; margin-top: 8px; display: none; }
  .success-msg { color: #2E7D32; font-size: 0.82rem; margin-top: 8px; display: none; }

  /* manage events list */
  .manage-event-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    gap: 8px;
  }
  .manage-event-info { font-size: 0.82rem; }
  .manage-event-info strong { display: block; }
  .manage-event-info span { color: var(--muted); font-size: 0.75rem; }
  .admin-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
  .admin-tab {
    flex: 1;
    padding: 7px;
    border: 1.5px solid var(--border);
    background: none;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .admin-tab.active { background: var(--text); color: #fff; border-color: var(--text); }

  /* export button */
  .export-row {
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }
  .btn-export {
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    padding: 8px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    width: 100%;
  }
  .btn-export:hover { border-color: var(--text); background: var(--tag-bg); }

  @media (max-width: 600px) {
    .event-card { grid-template-columns: 52px 1fr; }
    .event-meta { display: none; }
    .filters-bar { padding: 10px 12px; }
    main { padding: 20px 12px 80px; }
    .form-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Kingston<span>Radius</span></div>
  <nav>
    <a href="#" class="active">Music</a>
    <a href="#">Movies</a>
    <a href="#">Comedy</a>
    <a href="#">Art</a>
    <a href="#">Karaoke</a>
  </nav>
</header>

<div class="filters-bar">
  <div class="filter-row">
    <span class="filter-label">Distance</span>
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="30">≤ 30 min</button>
    <button class="filter-btn" data-filter="60">≤ 60 min</button>
    <button class="filter-btn" data-filter="90">≤ 90 min</button>
    <div class="filter-sep"></div>
    <button class="filter-btn red-btn" data-filter="free">Free only</button>
  </div>
  <div class="filter-row">
    <span class="filter-label">Date</span>
    <button class="filter-btn date-btn active" data-date="all">All dates</button>
    <button class="filter-btn date-btn" data-date="today">Today</button>
    <button class="filter-btn date-btn" data-date="week">This week</button>
    <button class="filter-btn date-btn" data-date="month">This month</button>
    <div class="filter-sep"></div>
    <span class="filter-label">Venue</span>
    <select id="venue-select" class="venue-select">
      <option value="">All venues</option>
    </select>
  </div>
</div>

<main>
  <div class="section-head">
    <h2>Upcoming Shows</h2>
    <span class="event-count" id="event-count"></span>
  </div>
  <div id="events-list"></div>
</main>

<!-- Admin trigger -->
<button id="admin-trigger" title="Admin">⚙</button>

<!-- Admin modal -->
<div class="modal-overlay" id="admin-modal">
  <div class="modal">
    <div class="modal-header">
      <h3>Admin Panel</h3>
      <button class="modal-close" id="modal-close-btn">✕</button>
    </div>
    <div class="modal-body">

      <!-- Auth screen -->
      <div id="auth-screen" class="active">
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="admin-pw" placeholder="Enter admin password" />
        </div>
        <button class="btn-primary" id="auth-submit-btn">Sign In</button>
        <div class="auth-error" id="auth-error">Incorrect password</div>
      </div>

      <!-- Form + manage screen -->
      <div id="form-screen">
        <div class="admin-tabs">
          <button class="admin-tab active" id="tab-add">Add Event</button>
          <button class="admin-tab" id="tab-manage">Manage</button>
        </div>

        <!-- Add event form -->
        <div id="add-panel">
          <div class="form-group">
            <label>Event Title *</label>
            <input type="text" id="f-title" placeholder="Artist or Event Name" />
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Date *</label>
              <input type="date" id="f-date" />
            </div>
            <div class="form-group">
              <label>Time</label>
              <input type="time" id="f-time" />
            </div>
          </div>
          <div class="form-group">
            <label>Venue Name *</label>
            <input type="text" id="f-venue" placeholder="e.g. Tubby's" />
          </div>
          <div class="form-group">
            <label>Venue Website URL</label>
            <input type="url" id="f-venue-url" placeholder="https://..." />
          </div>
          <div class="form-group">
            <label>Location (City, State)</label>
            <input type="text" id="f-location" placeholder="Kingston, NY" />
          </div>
          <div class="form-group">
            <label>Drive Time from Tubby's (minutes)</label>
            <input type="number" id="f-drive" placeholder="e.g. 15" min="0" max="120" />
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Price</label>
              <input type="text" id="f-price" placeholder="$15 / Free / See website" />
            </div>
            <div class="form-group">
              <label>Free?</label>
              <select id="f-free">
                <option value="false">No</option>
                <option value="true">Yes — Free</option>
              </select>
            </div>
          </div>
          <button class="btn-primary" id="add-event-btn">Add Event</button>
          <div class="success-msg" id="add-success">✓ Event added!</div>
        </div>

        <!-- Manage panel -->
        <div id="manage-panel" style="display:none">
          <div id="manage-list"></div>
          <div class="export-row">
            <button class="btn-export" id="export-btn">⬇ Export events.js backup</button>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="events.js"></script>
<script>
// ── VENUE DRIVE TIMES FROM TUBBY'S (minutes) ─────────────────────────────────
const DRIVE_TIMES = {
  "Tubby's":                          0,
  "Assembly Kingston":                5,
  "Unicorn Bar":                      5,
  "BSP Kingston":                     5,
  "Keegan Ales":                      8,
  "Hutton Brickyards":               10,
  "Rosendale Café":                  15,
  "Rosendale Theatre":               15,
  "Bearsville Theater":              20,
  "Levon Helm Studios":              20,
  "Opus 40":                         22,
  "Catskill Mountain Foundation":    35,
  "Bridge Street Theatre":           30,
  "Avalon Lounge":                   30,
  "Helsinki Hudson":                 35,
  "Hudson Brewing Company":          35,
  "Spotty Dog Books & Ale":          35,
  "Basilica Hudson":                 35,
  "Lively Arts at Chatham":          50,
  "Crandell Theatre":                50,
  "The Falcon":                      50,
  "Tompkins Corners Cultural Center":55,
  "Bard Fisher Center":              20,
  "Bardavon":                        35,
  "UPAC":                            35,
  "The Chance Theater":              35,
  "Catskill Brewery":                60,
  "The Outlier Inn":                 55,
  "Bethel Woods":                    75,
  "Daryl's House":                   55,
  "MASS MoCA":                       85,
};

function getDriveTime(venueName) {
  return DRIVE_TIMES[venueName] ?? 60;
}

function driveLabel(min) {
  if (min === 0) return null;
  return `~${min} min`;
}

// ── LOCAL STORAGE FOR MANUAL EVENTS ──────────────────────────────────────────
const STORAGE_KEY = 'kr_manual_events';
function getManualEvents() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch { return []; }
}
function saveManualEvents(evts) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(evts));
}

// ── MERGE & DEDUPLICATE ───────────────────────────────────────────────────────
function getAllEvents() {
  const scraped = (typeof EVENTS !== 'undefined') ? EVENTS : [];
  const manual = getManualEvents();
  const combined = [...scraped, ...manual];
  // Deduplicate: one event per (venue, date)
  const seen = new Map();
  for (const e of combined) {
    const key = `${e.venue}||${e.date}`;
    if (!seen.has(key)) seen.set(key, e);
  }
  return Array.from(seen.values());
}

// ── RENDER ────────────────────────────────────────────────────────────────────
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function parseDate(str) {
  if (!str) return null;
  const [y,m,d] = str.split('-').map(Number);
  return new Date(y, m-1, d);
}

function formatTime(t) {
  if (!t) return '';
  // Convert 24h to 12h if needed
  const m24 = t.match(/^(\d{1,2}):(\d{2})$/);
  if (m24) {
    let h = parseInt(m24[1]), min = m24[2];
    const ampm = h >= 12 ? 'PM' : 'AM';
    if (h > 12) h -= 12;
    if (h === 0) h = 12;
    return `${h}:${min} ${ampm}`;
  }
  return t;
}

let activeDistFilter = 'all';
let activeFreeFilter = false;
let activeDateFilter = 'all';
let activeVenueFilter = '';

function populateVenueSelect() {
  const all = getAllEvents();
  const venues = [...new Set(all.map(e => e.venue))].sort();
  const sel = document.getElementById('venue-select');
  sel.innerHTML = '<option value="">All venues</option>' +
    venues.map(v => `<option value="${v}">${v}</option>`).join('');
  sel.value = activeVenueFilter;
}

function renderEvents() {
  const all = getAllEvents();
  const today = new Date(); today.setHours(0,0,0,0);

  let filtered = all.filter(e => {
    const d = parseDate(e.date);
    return d && d >= today;
  });

  // Distance filter
  if (activeDistFilter !== 'all') {
    const maxMin = parseInt(activeDistFilter);
    filtered = filtered.filter(e => getDriveTime(e.venue) <= maxMin);
  }

  // Free filter
  if (activeFreeFilter) {
    filtered = filtered.filter(e => e.free);
  }

  // Date filter
  if (activeDateFilter !== 'all') {
    const now = new Date(); now.setHours(0,0,0,0);
    filtered = filtered.filter(e => {
      const d = parseDate(e.date);
      if (!d) return false;
      if (activeDateFilter === 'today') {
        return d.toDateString() === now.toDateString();
      }
      if (activeDateFilter === 'week') {
        const weekEnd = new Date(now); weekEnd.setDate(now.getDate() + 7);
        return d >= now && d <= weekEnd;
      }
      if (activeDateFilter === 'month') {
        return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
      }
      return true;
    });
  }

  // Venue filter
  if (activeVenueFilter) {
    filtered = filtered.filter(e => e.venue === activeVenueFilter);
  }

  // Sort by date
  filtered.sort((a,b) => (a.date||'').localeCompare(b.date||''));

  document.getElementById('event-count').textContent =
    filtered.length === 1 ? '1 show' : `${filtered.length} shows`;

  const list = document.getElementById('events-list');

  if (filtered.length === 0) {
    list.innerHTML = `<div class="no-events"><h3>No shows found</h3><p>Try expanding your filters.</p></div>`;
    return;
  }

  list.innerHTML = filtered.map(e => {
    const d = parseDate(e.date);
    const day = d ? d.getDate() : '';
    const mon = d ? MONTHS_SHORT[d.getMonth()] : '';
    const dow = d ? DAYS[d.getDay()] : '';
    const timeStr = formatTime(e.time);
    const isManual = !!e._manual;

    return `<div class="event-card${isManual ? ' manual-event' : ''}">
      <div class="event-date">
        <div class="date-day">${day}</div>
        <div class="date-mon">${mon}</div>
        <div class="date-dow">${dow}</div>
        ${timeStr ? `<div class="date-time">${timeStr}</div>` : ''}
        ${e.price && e.price !== 'See website' ? `<div class="date-price">${e.price}</div>` : ''}
      </div>
      <div class="event-body">
        <div class="event-title">${e.title}</div>
        <div class="event-venue">
          <a href="${e.venueUrl || '#'}" target="_blank" rel="noopener">${e.venue}</a>
          <span class="venue-loc">·
            <a href="${e.mapsUrl || '#'}" target="_blank" rel="noopener">${e.location}</a>
          </span>
        </div>
        <div class="event-tags">
          ${e.free ? '<span class="tag free">Free</span>' : ''}
          ${isManual ? '<span class="tag">Added manually</span>' : ''}
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── FILTER BUTTONS ────────────────────────────────────────────────────────────
document.querySelectorAll('.filter-btn[data-filter]').forEach(btn => {
  btn.addEventListener('click', () => {
    const f = btn.dataset.filter;
    if (f === 'free') {
      activeFreeFilter = !activeFreeFilter;
      btn.classList.toggle('active', activeFreeFilter);
    } else {
      activeDistFilter = f;
      document.querySelectorAll('.filter-btn[data-filter]:not([data-filter="free"])').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }
    renderEvents();
  });
});

document.querySelectorAll('.filter-btn.date-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    activeDateFilter = btn.dataset.date;
    document.querySelectorAll('.filter-btn.date-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderEvents();
  });
});

document.getElementById('venue-select').addEventListener('change', e => {
  activeVenueFilter = e.target.value;
  renderEvents();
});

// ── ADMIN PANEL ───────────────────────────────────────────────────────────────
const ADMIN_PASSWORD = 'kingston2025'; // ← change this to your own password

const adminModal = document.getElementById('admin-modal');
const authScreen = document.getElementById('auth-screen');
const formScreen = document.getElementById('form-screen');

document.getElementById('admin-trigger').addEventListener('click', () => {
  adminModal.classList.add('open');
  // Reset to auth if not authed
  if (!sessionStorage.getItem('kr_authed')) {
    authScreen.classList.add('active');
    formScreen.classList.remove('active');
  } else {
    authScreen.classList.remove('active');
    formScreen.classList.add('active');
    renderManage();
  }
});

document.getElementById('modal-close-btn').addEventListener('click', () => {
  adminModal.classList.remove('open');
});
adminModal.addEventListener('click', e => {
  if (e.target === adminModal) adminModal.classList.remove('open');
});

// Auth
document.getElementById('auth-submit-btn').addEventListener('click', () => {
  const pw = document.getElementById('admin-pw').value;
  if (pw === ADMIN_PASSWORD) {
    sessionStorage.setItem('kr_authed', '1');
    document.getElementById('auth-error').style.display = 'none';
    authScreen.classList.remove('active');
    formScreen.classList.add('active');
    renderManage();
  } else {
    document.getElementById('auth-error').style.display = 'block';
  }
});
document.getElementById('admin-pw').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('auth-submit-btn').click();
});

// Tabs
document.getElementById('tab-add').addEventListener('click', () => {
  document.getElementById('tab-add').classList.add('active');
  document.getElementById('tab-manage').classList.remove('active');
  document.getElementById('add-panel').style.display = '';
  document.getElementById('manage-panel').style.display = 'none';
});
document.getElementById('tab-manage').addEventListener('click', () => {
  document.getElementById('tab-manage').classList.add('active');
  document.getElementById('tab-add').classList.remove('active');
  document.getElementById('add-panel').style.display = 'none';
  document.getElementById('manage-panel').style.display = '';
  renderManage();
});

// Add event
document.getElementById('add-event-btn').addEventListener('click', () => {
  const title = document.getElementById('f-title').value.trim();
  const date = document.getElementById('f-date').value;
  const timeRaw = document.getElementById('f-time').value;
  const venue = document.getElementById('f-venue').value.trim();
  const venueUrl = document.getElementById('f-venue-url').value.trim();
  const location = document.getElementById('f-location').value.trim() || 'Kingston, NY';
  const driveMin = parseInt(document.getElementById('f-drive').value) || 0;
  const price = document.getElementById('f-price').value.trim() || 'See website';
  const free = document.getElementById('f-free').value === 'true';

  if (!title || !date || !venue) {
    alert('Title, date, and venue are required.');
    return;
  }

  const manual = getManualEvents();
  const newEvt = {
    id: Date.now(),
    title, date,
    time: timeRaw,
    venue, venueUrl,
    location,
    mapsUrl: `https://maps.google.com/?q=${encodeURIComponent(venue+' '+location)}`,
    price, free,
    _manual: true,
    _driveMin: driveMin
  };
  manual.push(newEvt);
  saveManualEvents(manual);

  // Register drive time
  if (driveMin > 0) DRIVE_TIMES[venue] = driveMin;

  // Clear form
  ['f-title','f-date','f-time','f-venue','f-venue-url','f-location','f-drive','f-price'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('f-free').value = 'false';

  const s = document.getElementById('add-success');
  s.style.display = 'block';
  setTimeout(() => s.style.display = 'none', 2500);

  renderEvents();
});

// Manage list
function renderManage() {
  const manual = getManualEvents();
  const list = document.getElementById('manage-list');
  if (manual.length === 0) {
    list.innerHTML = '<p style="color:var(--muted);font-size:0.85rem;">No manually added events yet.</p>';
    return;
  }
  list.innerHTML = manual.map(e => `
    <div class="manage-event-row">
      <div class="manage-event-info">
        <strong>${e.title}</strong>
        <span>${e.date} · ${e.venue}</span>
      </div>
      <button class="btn-danger" data-id="${e.id}">Remove</button>
    </div>
  `).join('');
  list.querySelectorAll('.btn-danger').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = parseInt(btn.dataset.id);
      const updated = getManualEvents().filter(e => e.id !== id);
      saveManualEvents(updated);
      renderManage();
      renderEvents();
    });
  });
}

// Export
document.getElementById('export-btn').addEventListener('click', () => {
  const all = getAllEvents();
  const lines = all.map((e,i) => {
    const t = (e.title||'').replace(/\\/g,'\\\\').replace(/"/g,'\\"');
    return `  {\n    id: ${i+1},\n    date: "${e.date}",\n    title: "${t}",\n    venue: "${e.venue}",\n    venueUrl: "${e.venueUrl||''}",\n    location: "${e.location}",\n    mapsUrl: "${e.mapsUrl||''}",\n    time: "${e.time||''}",\n    price: "${e.price||''}",\n    free: ${e.free ? 'true' : 'false'}\n  }`;
  });
  const blob = new Blob([`const EVENTS = [\n${lines.join(',\n')}\n];\n`], {type:'text/javascript'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'events.js';
  a.click();
});

// ── INIT ──────────────────────────────────────────────────────────────────────
populateVenueSelect();
renderEvents();
</script>
</body>
